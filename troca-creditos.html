<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Troca de Creditos | Smart Choice Vendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <p class="eyebrow">SMART CHOICE VENDAS</p>
      <h1>Pagina de Troca de Creditos</h1>
      <p class="hero-copy">Troque seus creditos por celulares e acessorios quando seu saldo for suficiente.</p>
      <div class="hero-actions">
        <a class="btn btn-ghost" href="index.html">Voltar para inicio</a>
      </div>
    </section>

    <section class="card">
      <div class="wallet-bar">
        <div>
          <span>Saldo atual</span>
          <strong id="walletCredits">0</strong>
        </div>
        <div>
          <span>Usuario</span>
          <strong id="walletUser">Nao logado</strong>
        </div>
      </div>
      <small id="walletFeedback"></small>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Vitrine de troca</h2>
        <p>Somente produtos com preco em creditos.</p>
      </div>
      <div id="productsGrid" class="products-grid"></div>
    </section>
  </main>

  <script src="troca.js" defer></script>
</body>
</html>
